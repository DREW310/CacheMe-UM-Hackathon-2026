<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligent Workflow Copilot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 400px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #2c3e50;
            color: white;
            padding: 16px;
            text-align: center;
            font-weight: bold;
        }
        .chat-box {
            height: 400px;
            padding: 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #fafafa;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.4;
        }
        .message.user {
            background: #3498db;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }
        .message.bot {
            background: #e9ecef;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }
        .input-area {
            display: flex;
            padding: 12px;
            background: white;
            border-top: 1px solid #ddd;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 16px;
            margin-left: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Support Copilot</div>
    <div class="chat-box" id="chat-box">
        <div class="message bot">Hello! How can we assist you today?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // Generate a simple random session ID for testing
    const sessionId = Math.random().toString(36).substring(7);

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const messageText = inputField.value.trim();
        if (!messageText) return;

        // 1. Display User Message
        appendMessage(messageText, "user");
        inputField.value = "";

        // 2. Send Data to Python Backend
        try {
            const response = await fetch("http://localhost:8000/api/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: messageText,
                    session_id: sessionId
                })
            });

            const data = await response.json();
            
            // 3. Display Copilot Response
            appendMessage(data.reply, "bot");

        } catch (error) {
            console.error("Error connecting to backend:", error);
            appendMessage("Error: Could not connect to the server.", "bot");
        }
    }

    function appendMessage(text, sender) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;
        msgDiv.textContent = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; // Auto-scroll to bottom
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }
</script>

</body>
</html>
