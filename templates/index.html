<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Detection Copilot</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 500px; background: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #2c3e50; color: white; padding: 16px; text-align: center; font-weight: bold; }
        .chat-box { height: 450px; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .message { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
        .message.user { background: #3498db; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .message.bot { background: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 0; white-space: pre-wrap; }
        .input-area { display: flex; flex-direction: column; padding: 12px; background: white; border-top: 1px solid #ddd; }
        .file-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .file-label { font-size: 12px; color: #666; }
        .remove-file { display: none; font-size: 12px; color: #e74c3c; cursor: pointer; font-weight: bold; background: none; border: none; padding: 0; }
        .remove-file:hover { text-decoration: underline; }
        .input-row { display: flex; width: 100%; gap: 8px; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; outline: none; }
        button { background: #3498db; color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #2980b9; }
        .mic-btn { background: #e67e22; padding: 10px 12px; }
        .mic-btn:hover { background: #d35400; }
        .mic-btn.recording { background: #e74c3c; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">LHDN Fraud Detective Agent</div>
    <div class="chat-box" id="chat-box">
        <div class="message bot">Upload an e-invoice (Image or XML) to verify it against the LHDN schema and our corporate database. You can also use the microphone to add verbal instructions!</div>
    </div>
    <div class="input-area">
        <div class="file-info">
            <div class="file-label" id="file-name-display">No file selected</div>
            <button class="remove-file" id="remove-file-btn" onclick="clearFile()">❌ Remove</button>
        </div>
        <div class="input-row">
            <input type="file" id="file-upload" accept="image/png, image/jpeg, text/xml, application/pdf" style="display: none;" onchange="updateFileName()">
            <button onclick="document.getElementById('file-upload').click()" style="background: #7f8c8d;">📎</button>
            <button class="mic-btn" id="mic-btn" onclick="toggleDictation()" title="Click to speak">🎤</button>
            
            <input type="text" id="user-input" placeholder="Type or speak instructions..." onkeypress="handleKeyPress(event)">
            <button id="scan-btn" onclick="sendMessage()">Scan</button>
        </div>
    </div>
</div>

<script>
    const sessionId = Math.random().toString(36).substring(7);

    // --- File Handling & Voice ---
    function updateFileName() {
        const fileInput = document.getElementById('file-upload');
        const display = document.getElementById('file-name-display');
        const removeBtn = document.getElementById('remove-file-btn');
        if (fileInput.files.length > 0) {
            display.textContent = "📎 Attached: " + fileInput.files[0].name;
            removeBtn.style.display = "block";
        } else {
            display.textContent = "No file selected";
            removeBtn.style.display = "none";
        }
    }

    function clearFile() {
        document.getElementById('file-upload').value = "";
        updateFileName();
    }

    let recognition;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US'; 
        recognition.onresult = function(e) {
            const transcript = e.results[0][0].transcript;
            const inputField = document.getElementById('user-input');
            inputField.value = inputField.value ? inputField.value + " " + transcript : transcript;
            stopDictationUI();
        };
        recognition.onerror = stopDictationUI;
        recognition.onend = stopDictationUI;
    }

    function toggleDictation() {
        const micBtn = document.getElementById('mic-btn');
        if (!recognition) return alert("Voice not supported.");
        if (micBtn.classList.contains('recording')) { recognition.stop(); stopDictationUI(); } 
        else { micBtn.classList.add('recording'); recognition.start(); }
    }
    function stopDictationUI() { document.getElementById('mic-btn').classList.remove('recording'); }

    // --- Agentic State Management ---
    let pendingFieldsToFix = []; 
    let currentExtractedData = null; 

    // --- Chat Logic ---
    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const fileInput = document.getElementById("file-upload");
        const scanBtn = document.getElementById("scan-btn"); 
        const messageText = inputField.value.trim();
        const file = fileInput.files[0];

        // --- SCENARIO A: User is fixing missing fields ---
        if (pendingFieldsToFix.length > 0) {
            if (!messageText) return;
            
            appendMessage(`Providing: ${messageText}`, "user");
            
            // Map their answer to the correct JSON field locally
            let fieldName = pendingFieldsToFix[0];
            if (fieldName === "Invoice Number") currentExtractedData.invoice_metadata.invoice_number = messageText;
            if (fieldName === "Supplier Name") currentExtractedData.supplier_details.name = messageText;
            
            pendingFieldsToFix.shift(); // Remove from queue
            inputField.value = "";
            
            // Still more fields to fix? Ask locally without hitting the server!
            if (pendingFieldsToFix.length > 0) {
                inputField.placeholder = `Please enter: ${pendingFieldsToFix[0]}...`;
                appendMessage(`Got it! Now I just need: **${pendingFieldsToFix[0]}**`, "bot");
                return; 
            } 
            
            // All done! Send the completed JSON to the server
            inputField.placeholder = "Type or speak instructions...";
            scanBtn.textContent = "Scan";
            scanBtn.style.backgroundColor = "#3498db";
            
            appendMessage("All data collected! Verifying with the database...", "bot");
            
            const formData = new FormData();
            formData.append("message", "FINAL_DATA:" + JSON.stringify(currentExtractedData));
            formData.append("session_id", sessionId);
            sendDataToBackend(formData);
            return;
        }

        // --- SCENARIO B: Normal Document Scan ---
        if (!messageText && !file) return;

        appendMessage(file ? `📎 [File: ${file.name}]\n${messageText || "Please analyze this invoice."}` : messageText, "user");
        
        const formData = new FormData();
        formData.append("message", messageText || "Please analyze this invoice.");
        formData.append("session_id", sessionId);
        if (file) { formData.append("file", file); }

        inputField.value = "";
        clearFile(); 
        appendMessage("Analyzing document with Z.AI...", "bot"); 
        sendDataToBackend(formData);
    }

    async function sendDataToBackend(formData) {
        try {
            const response = await fetch("http://localhost:8000/api/chat", { method: "POST", body: formData });
            const data = await response.json();
            
            const chatBox = document.getElementById("chat-box");
            chatBox.removeChild(chatBox.lastChild); 
            
            if (data.action === "AWAITING_USER_DECISION") {
                pendingFieldsToFix = data.missing_fields;
                currentExtractedData = data.partial_data; // Store the clipboard data
                
                const inputField = document.getElementById("user-input");
                const scanBtn = document.getElementById("scan-btn");
                inputField.placeholder = `Please enter: ${pendingFieldsToFix[0]}...`;
                inputField.focus();
                scanBtn.textContent = "💾 Save";
                scanBtn.style.backgroundColor = "#f39c12"; 
            }
            
            const msgDiv = document.createElement("div");
            msgDiv.className = "message bot";
            msgDiv.innerHTML = data.reply.replace(/\n/g, '<br>');
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

        } catch (error) {
            console.error("Error:", error);
            const chatBox = document.getElementById("chat-box");
            chatBox.removeChild(chatBox.lastChild);
            appendMessage("Error: Could not connect to the backend.", "bot");
        }
    }

    function appendMessage(text, sender) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${sender}`;
        msgDiv.innerHTML = text.replace(/\n/g, '<br>'); 
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) { if (event.key === "Enter") sendMessage(); }
</script>

</body>
</html>
